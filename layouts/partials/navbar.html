<header class="navbar" id="navbar">
  <div class="container navbar-inner">
    <a href="{{ "/" | relURL }}" class="brand" aria-label="NECB 2026 home">
      <img src="{{ "img/logo.svg" | relURL }}" alt="" class="brand-logo">
      <span class="brand-text">NECB <span class="brand-year">2026</span></span>
    </a>

    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="primary-nav">
      <span></span><span></span><span></span>
    </button>

    <nav id="primary-nav" class="primary-nav" aria-label="Primary">
      <ul>
        {{ range site.Menus.main }}
          <li><a href="{{ .URL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
