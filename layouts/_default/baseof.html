<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ site.Title }} · New England Computational Biology Symposium{{ else }}{{ .Title }} · {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ site.Params.description }}">
  <meta name="author" content="{{ site.Params.author }}">

  {{/* Open Graph */}}
  <meta property="og:title" content="{{ site.Title }} — New England Computational Biology Symposium">
  <meta property="og:description" content="{{ site.Params.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.BaseURL }}">

  {{/* Favicon */}}
  <link rel="icon" type="image/svg+xml" href="{{ "img/favicon.svg" | relURL }}">

  {{/* Fonts */}}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">

  {{/* Styles */}}
  {{ $css := resources.Get "css/main.css" | resources.Minify | resources.Fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">

  {{ block "head" . }}{{ end }}
</head>
<body>
  {{ partial "navbar.html" . }}
  <main id="content">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script src="{{ "js/nav.js" | relURL }}" defer></script>
</body>
</html>
